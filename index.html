
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Yuva Bharat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #138808;
      --secondary: #FF9933;
      --danger: #dc3545;
      --warning: #ffc107;
      --success: #28a745;
      --info: #17a2b8;
      --light: #f8f9fa;
      --dark: #212529;
      --border: #dee2e6;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.15);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: var(--dark);
      min-height: 100vh;
    }

    /* Login Container */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .login-header {
      margin-bottom: 30px;
    }

    .login-header h1 {
      color: var(--primary);
      font-size: 28px;
      margin-bottom: 10px;
    }

    .login-header p {
      color: #6c757d;
      font-size: 14px;
    }

    .google-signin {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: white;
      color: #333;
      border: 2px solid var(--border);
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      width: 100%;
      font-size: 16px;
    }

    .google-signin:hover {
      background: var(--light);
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .google-signin img {
      width: 20px;
      height: 20px;
    }

    /* Dashboard Layout */
    .dashboard-wrapper {
      display: none;
      min-height: 100vh;
      background: var(--light);
    }

    .dashboard-header {
      background: white;
      padding: 20px 0;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .dashboard-header-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dashboard-header h1 {
      color: var(--primary);
      font-size: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logout-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn:hover {
      background: #c82333;
      transform: translateY(-2px);
    }

    .dashboard-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    /* Status Messages */
    .alert {
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      animation: slideIn 0.3s ease;
      font-weight: 500;
    }

    .alert.show {
      display: block;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border-left: 4px solid var(--success);
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border-left: 4px solid var(--danger);
    }

    @keyframes slideIn {
      from {
        transform: translateY(-10px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .btn:hover {
      background: #0d6b03;
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn-secondary {
      background: var(--secondary);
    }

    .btn-secondary:hover {
      background: #e68a1f;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-warning {
      background: var(--warning);
      color: #333;
    }

    .btn-warning:hover {
      background: #e0a800;
    }

    /* Table Styles */
    .table-wrapper {
      background: white;
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: linear-gradient(135deg, var(--primary) 0%, #0d6b03 100%);
      color: white;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 12px 15px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      transition: all 0.2s ease;
    }

    tbody tr:hover {
      background: #f8f9fa;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    /* Student Photo */
    .student-photo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }

    .no-photo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--secondary) 0%, #ff7a00 100%);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-assigned {
      background: #d4edda;
      color: #155724;
    }

    .badge-pending {
      background: #fff3cd;
      color: #856404;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .action-btn-assign {
      background: var(--secondary);
      color: white;
    }

    .action-btn-assign:hover {
      background: #e68a1f;
    }

    .action-btn-edit {
      background: var(--warning);
      color: #333;
    }

    .action-btn-edit:hover {
      background: #e0a800;
    }

    .action-btn-delete {
      background: var(--danger);
      color: white;
    }

    .action-btn-delete:hover {
      background: #c82333;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal.show {
      display: flex !important;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--border);
    }

    .modal-header h2 {
      color: var(--primary);
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #6c757d;
      transition: color 0.3s ease;
    }

    .close-btn:hover {
      color: var(--dark);
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: var(--dark);
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(19, 136, 8, 0.1);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Button Group */
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    .button-group button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .button-group .btn-primary {
      background: var(--primary);
      color: white;
    }

    .button-group .btn-primary:hover {
      background: #0d6b03;
    }

    .button-group .btn-secondary {
      background: #e9ecef;
      color: var(--dark);
    }

    .button-group .btn-secondary:hover {
      background: #dee2e6;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .dashboard-header-content {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }

      .dashboard-header h1 {
        font-size: 20px;
      }

      .toolbar {
        flex-direction: column;
      }

      .toolbar .btn {
        width: 100%;
        justify-content: center;
      }

      .table-wrapper {
        overflow-x: auto;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px;
      }

      .action-buttons {
        flex-direction: column;
        gap: 4px;
      }

      .action-btn {
        width: 100%;
        justify-content: center;
      }

      .modal-content {
        width: 95%;
        padding: 20px;
      }

      .login-container {
        padding: 30px 20px;
      }
    }

    @media (max-width: 480px) {
      .dashboard-main {
        padding: 15px 10px;
      }

      .dashboard-header h1 {
        font-size: 18px;
      }

      th, td {
        padding: 8px;
        font-size: 11px;
      }

      .action-btn {
        font-size: 10px;
        padding: 4px 8px;
      }

      .logout-btn {
        padding: 8px 12px;
        font-size: 13px;
      }

      .button-group {
        flex-direction: column;
      }

      .button-group button {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Login Container -->
  <div class="login-wrapper" id="loginWrapper">
    <div class="login-container">
      <div class="login-header">
        <h1>
          <i class="fas fa-graduation-cap"></i> Yuva Bharat
        </h1>
        <p>Admin Dashboard</p>
      </div>
      <button class="google-signin" id="googleSignin">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
        Sign in with Google
      </button>
      <div class="alert" id="loginAlert"></div>
    </div>
  </div>

  <!-- Dashboard Container -->
  <div class="dashboard-wrapper" id="dashboardWrapper">
    <div class="dashboard-header">
      <div class="dashboard-header-content">
        <h1>
          <i class="fas fa-chart-bar"></i> Dashboard
        </h1>
        <button class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>

    <div class="dashboard-main">
      <div class="alert" id="dashboardAlert"></div>

      <div class="toolbar">
        <button class="btn" id="refreshBtn">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>

      <div class="table-wrapper">
        <table id="studentsTable">
          <thead>
            <tr>
              <th>Photo</th>
              <th>Name</th>
              <th>College</th>
              <th>Course</th>
              <th>Year</th>
              <th>Specialization</th>
              <th>Mobile</th>
              <th>Email</th>
              <th>Company</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Student</h2>
        <button class="close-btn" onclick="closeEditModal()">&times;</button>
      </div>
      <form id="editForm">
        <input type="hidden" id="editStudentId">
        <div class="form-group">
          <label for="editFullName">Full Name</label>
          <input type="text" id="editFullName" required>
        </div>
        <div class="form-group">
          <label for="editCollegeName">College Name</label>
          <input type="text" id="editCollegeName" required>
        </div>
        <div class="form-group">
          <label for="editCourse">Course</label>
          <input type="text" id="editCourse" required>
        </div>
        <div class="form-group">
          <label for="editCurrentYear">Current Year</label>
          <input type="number" id="editCurrentYear" min="1" max="5" required>
        </div>
        <div class="form-group">
          <label for="editSpecialization">Specialization</label>
          <input type="text" id="editSpecialization">
        </div>
        <div class="form-group">
          <label for="editMobileNumber">Mobile Number</label>
          <input type="text" id="editMobileNumber" required>
        </div>
        <div class="form-group">
          <label for="editEmailId">Email ID</label>
          <input type="email" id="editEmailId" required>
        </div>
        <div class="button-group">
          <button type="button" class="btn-primary" onclick="saveEdit()">Save Changes</button>
          <button type="button" class="btn-secondary" onclick="closeEditModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Assign Company Modal -->
  <div class="modal" id="assignModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Assign Company</h2>
        <button class="close-btn" onclick="closeAssignModal()">&times;</button>
      </div>
      <form id="assignForm">
        <input type="hidden" id="assignStudentId">
        <div class="form-group">
          <label for="companyName">Select Company</label>
          <select id="companyName" required>
            <option value="">Choose a company...</option>
            <option value="Asl Motors Pvt Ltd">Asl Motors Pvt Ltd</option>
            <option value="Hero Moto Corp">Hero Moto Corp</option>
            <option value="Yamaha Motor Company">Yamaha Motor Company</option>
            <option value="New Auto Pvt Ltd">New Auto Pvt Ltd</option>
            <option value="Sai Enterprises">Sai Enterprises</option>
            <option value="JUSCO">JUSCO</option>
            <option value="Sudisa">Sudisa</option>
            <option value="Arush Metal Casting Ltd">Arush Metal Casting Ltd</option>
            <option value="Honda Motorcycle and Scooter India">Honda Motorcycle and Scooter India</option>
            <option value="Skoda Auto">Skoda Auto</option>
          </select>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="sendEmail" checked>
            <label for="sendEmail" style="margin: 0;">Send email notification</label>
          </div>
        </div>
        <div class="button-group">
          <button type="button" class="btn-primary" onclick="assignCompany()">Assign Company</button>
          <button type="button" class="btn-secondary" onclick="closeAssignModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script>
    emailjs.init('AgZwkb4bX9rqulmzK');

    const firebaseConfig = {
      apiKey: "AIzaSyC9erOtjg-xhoWm8RO2Adn_KDJOPml3FXE",
      authDomain: "shop-dbf4b.firebaseapp.com",
      projectId: "shop-dbf4b",
      storageBucket: "shop-dbf4b.appspot.com",
      messagingSenderId: "321149556755",
      appId: "1:321149556755:web:b48e8270e5af9fe51007e6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let adminToken = null;
    let currentEditId = null;
    const backendUrl = 'https://hackthon-ujtu.onrender.com';

    // UI Elements
    const loginWrapper = document.getElementById('loginWrapper');
    const dashboardWrapper = document.getElementById('dashboardWrapper');
    const googleSignin = document.getElementById('googleSignin');
    const loginAlert = document.getElementById('loginAlert');
    const dashboardAlert = document.getElementById('dashboardAlert');
    const refreshBtn = document.getElementById('refreshBtn');
    const studentsTableBody = document.getElementById('studentsTableBody');
    const editModal = document.getElementById('editModal');
    const assignModal = document.getElementById('assignModal');

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      googleSignin.addEventListener('click', signInWithGoogle);
      refreshBtn.addEventListener('click', fetchStudents);
      
      // Close modals on background click
      window.addEventListener('click', (e) => {
        if (e.target === editModal) closeEditModal();
        if (e.target === assignModal) closeAssignModal();
      });

      // Check if already logged in
      auth.onAuthStateChanged((user) => {
        if (user) {
          user.getIdToken().then((token) => {
            adminToken = token;
            loadDashboard();
          });
        }
      });
    });

    function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => result.user.getIdToken())
        .then((token) => {
          adminToken = token;
          showAlert(loginAlert, 'Login successful! Loading dashboard...', 'success');
          setTimeout(loadDashboard, 500);
        })
        .catch((error) => {
          showAlert(loginAlert, 'Login failed: ' + error.message, 'error');
        });
    }

    function loadDashboard() {
      loginWrapper.style.display = 'none';
      dashboardWrapper.style.display = 'block';
      fetchStudents();
    }

    function showAlert(element, message, type) {
      element.textContent = message;
      element.className = `alert show alert-${type}`;
      setTimeout(() => {
        element.classList.remove('show');
      }, 5000);
    }

    async function fetchStudents() {
      showAlert(dashboardAlert, 'Loading students...', 'success');
      try {
        const response = await fetch(`${backendUrl}/api/admin/students`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        if (!response.ok) throw new Error('Failed to fetch students');
        const students = await response.json();
        renderStudents(students);
        showAlert(dashboardAlert, 'Students loaded successfully!', 'success');
      } catch (error) {
        showAlert(dashboardAlert, 'Error: ' + error.message, 'error');
      }
    }

    function renderStudents(students) {
      studentsTableBody.innerHTML = '';
      students.forEach(student => {
        const row = document.createElement('tr');
        const photoCell = student.photo
          ? `<img src="${student.photo}" class="student-photo" alt="${student.fullName}">`
          : `<div class="no-photo"><i class="fas fa-user"></i></div>`;
        const statusBadge = student.assignedCompany
          ? `<span class="badge badge-assigned">${student.assignedCompany} ✓</span>`
          : `<span class="badge badge-pending">Pending</span>`;

        row.innerHTML = `
          <td>${photoCell}</td>
          <td>${student.fullName}</td>
          <td>${student.collegeName}</td>
          <td>${student.course}</td>
          <td>${student.currentYear}</td>
          <td>${student.specialization || '-'}</td>
          <td>${student.mobileNumber}</td>
          <td>${student.emailId}</td>
          <td>${statusBadge}</td>
          <td>
            <div class="action-buttons">
              <button class="action-btn action-btn-assign" onclick="openAssignModal('${student.id}')">
                <i class="fas fa-building"></i> Assign
              </button>
              <button class="action-btn action-btn-edit" onclick="openEditModal('${student.id}')">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button class="action-btn action-btn-delete" onclick="deleteStudent('${student.id}')">
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>
          </td>
        `;
        studentsTableBody.appendChild(row);
      });
    }

    async function openEditModal(studentId) {
      currentEditId = studentId;
      try {
        const response = await fetch(`${backendUrl}/api/admin/students/${studentId}`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        if (!response.ok) throw new Error('Failed to fetch student');
        const student = await response.json();
        document.getElementById('editStudentId').value = studentId;
        document.getElementById('editFullName').value = student.fullName;
        document.getElementById('editCollegeName').value = student.collegeName;
        document.getElementById('editCourse').value = student.course;
        document.getElementById('editCurrentYear').value = student.currentYear;
        document.getElementById('editSpecialization').value = student.specialization || '';
        document.getElementById('editMobileNumber').value = student.mobileNumber;
        document.getElementById('editEmailId').value = student.emailId;
        editModal.classList.add('show');
      } catch (error) {
        showAlert(dashboardAlert, 'Error: ' + error.message, 'error');
      }
    }

    function closeEditModal() {
      editModal.classList.remove('show');
    }

    async function saveEdit() {
      const updatedData = {
        fullName: document.getElementById('editFullName').value,
        collegeName: document.getElementById('editCollegeName').value,
        course: document.getElementById('editCourse').value,
        currentYear: parseInt(document.getElementById('editCurrentYear').value),
        specialization: document.getElementById('editSpecialization').value || null,
        mobileNumber: document.getElementById('editMobileNumber').value,
        emailId: document.getElementById('editEmailId').value
      };
      try {
        const response = await fetch(`${backendUrl}/api/admin/students/${currentEditId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}`
          },
          body: JSON.stringify(updatedData)
        });
        if (!response.ok) throw new Error('Failed to update student');
        showAlert(dashboardAlert, 'Student updated successfully!', 'success');
        closeEditModal();
        fetchStudents();
      } catch (error) {
        showAlert(dashboardAlert, 'Error: ' + error.message, 'error');
      }
    }

    function openAssignModal(studentId) {
      document.getElementById('assignStudentId').value = studentId;
      assignModal.classList.add('show');
    }

    function closeAssignModal() {
      assignModal.classList.remove('show');
    }

    async function assignCompany() {
      const studentId = document.getElementById('assignStudentId').value;
      const companyName = document.getElementById('companyName').value;
      const sendEmail = document.getElementById('sendEmail').checked;

      if (!companyName) {
        showAlert(dashboardAlert, 'Please select a company', 'error');
        return;
      }

      showAlert(dashboardAlert, 'Assigning company...', 'success');
      try {
        const studentResponse = await fetch(`${backendUrl}/api/admin/students/${studentId}`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        if (!studentResponse.ok) throw new Error('Failed to fetch student');
        const studentData = await studentResponse.json();

        const response = await fetch(`${backendUrl}/api/admin/students/${studentId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}`
          },
          body: JSON.stringify({
            ...studentData,
            assignedCompany: companyName
          })
        });
        if (!response.ok) throw new Error('Failed to assign company');

        if (sendEmail) {
          try {
            await emailjs.send('service_5hlh3td', 'template_mqq7hac', {
              to_name: studentData.fullName,
              companyName: companyName,
              email: studentData.emailId,
              from_name: 'Yuva Bharat'
            });
            showAlert(dashboardAlert, 'Company assigned and email sent!', 'success');
          } catch (error) {
            showAlert(dashboardAlert, 'Company assigned, email failed', 'success');
          }
        } else {
          showAlert(dashboardAlert, 'Company assigned successfully!', 'success');
        }
        closeAssignModal();
        fetchStudents();
      } catch (error) {
        showAlert(dashboardAlert, 'Error: ' + error.message, 'error');
      }
    }

    async function deleteStudent(studentId) {
      if (!confirm('Delete this student permanently?')) return;
      try {
        const response = await fetch(`${backendUrl}/api/admin/students/${studentId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        if (!response.ok) throw new Error('Failed to delete student');
        showAlert(dashboardAlert, 'Student deleted successfully!', 'success');
        fetchStudents();
      } catch (error) {
        showAlert(dashboardAlert, 'Error: ' + error.message, 'error');
      }
    }

    function logout() {
      auth.signOut().then(() => {
        adminToken = null;
        dashboardWrapper.style.display = 'none';
        loginWrapper.style.display = 'flex';
        showAlert(loginAlert, 'Logged out successfully', 'success');
      }).catch((error) => {
        showAlert(loginAlert, 'Logout failed: ' + error.message, 'error');
      });
    }
  </script>
